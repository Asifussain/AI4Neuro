version: 2
updates:
  # Unified platform — the actively developed app.
  - package-ecosystem: "pip"
    directory: "/platform/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
  - package-ecosystem: "npm"
    directory: "/platform/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  # Legacy apps — not actively developed, but still deployed and reachable;
  # dependency vulnerabilities there are worth tracking even without a
  # broader code-modernization effort.
  - package-ecosystem: "pip"
    directory: "/Alzheimer-Detection/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
  - package-ecosystem: "npm"
    directory: "/Alzheimer-Detection/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
  - package-ecosystem: "pip"
    directory: "/mri-platform/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
  - package-ecosystem: "npm"
    directory: "/mri-platform/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # GitHub Actions workflow dependencies.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
