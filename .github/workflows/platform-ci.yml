name: platform-ci

# CI for the unified platform (platform/) and the shared Supabase schema
# (supabase/). The two legacy apps are not built here.
on:
  push:
    branches: ["**"]
    paths: ["platform/**", "supabase/**", ".github/workflows/platform-ci.yml"]
  pull_request:
    paths: ["platform/**", "supabase/**", ".github/workflows/platform-ci.yml"]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (api + test deps)
        run: pip install -r requirements/dev.txt
      - name: Tests
        # EEG/MRI/report pipeline tests self-skip when torch/matplotlib/nibabel are
        # absent (importorskip), so this gate runs the API/permission/list suites.
        run: pytest -q

  migrations:
    # Applies the canonical from-scratch schema (supabase/setup/full_setup.sql)
    # against a real, empty Postgres instance on every push — a broken
    # migration (syntax error, missing IF EXISTS, bad RLS policy) previously
    # had zero automated coverage and would only surface when someone pasted
    # it into the Supabase SQL editor, in production if unlucky.
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGPASSWORD: postgres
      PGHOST: localhost
      PGUSER: postgres
    steps:
      - uses: actions/checkout@v4
      - name: Stub Supabase-managed schema (auth.*, storage.*)
        # full_setup.sql assumes a real Supabase project's auth/storage
        # schemas already exist; a plain Postgres service needs a minimal
        # stand-in for auth.users/auth.uid()/storage.buckets to apply cleanly.
        run: |
          psql -d postgres <<'SQL'
          create extension if not exists pgcrypto;
          create schema if not exists auth;
          create table if not exists auth.users (id uuid primary key default gen_random_uuid());
          create or replace function auth.uid() returns uuid language sql stable as $$ select null::uuid $$;
          create schema if not exists storage;
          create table if not exists storage.buckets (id text primary key, name text not null, public boolean not null default false);
          SQL
      - name: Apply full_setup.sql
        run: psql -d postgres -v ON_ERROR_STOP=1 -f supabase/setup/full_setup.sql
      - name: Re-apply (idempotency check — every migration must be safe to run twice)
        run: psql -d postgres -v ON_ERROR_STOP=1 -f supabase/setup/full_setup.sql

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: platform/frontend/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Lint (unified code only)
        # The frontend is built on the inherited mri-platform base, which ships
        # its own lint debt (no-explicit-any, react-hooks) in unmodified files.
        # Gate lint on the NEW unified code; typecheck + build cover the whole app.
        run: >-
          npx eslint
          src/lib/api/client.ts
          src/features/analysis
          src/app/analysis
          src/app/dashboard
          src/app/admin
          src/app/super-admin
      - name: Unit/component tests
        run: npm run test -- --run
      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build
